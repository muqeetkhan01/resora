name: resora
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.4.1 <4.0.0'
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  get: ^4.6.6
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  firebase_core: 3.8.0
  firebase_auth: 5.3.3
  cloud_firestore: 5.5.0
  google_sign_in: 6.2.2
  sign_in_with_apple: 7.0.1
  firebase_storage:
  intl:
  image_picker:
  just_audio: ^0.9.46

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/audio/

  fonts:
    - family: Cormorant Garamond Regular
      fonts:
        - asset: assets/lottie/f/Cormorant Garamond Regular.ttf
